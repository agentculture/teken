name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write  # for posting the preview URL comment on PRs

jobs:
  build-and-deploy:
    # Pull requests from forks cannot see the Cloudflare secrets (GitHub
    # masks them for security), so the deploy step would fail. Skip the
    # whole job for fork PRs and rely on local `bundle exec jekyll serve`
    # for review. Same-repo PRs hit the fast path.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Jekyll build.
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a  # v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: docs
      - run: bundle exec jekyll build
        working-directory: docs

      # Compute the Cloudflare Pages branch name from the PR's head ref.
      # CF Pages uses the branch name as a subdomain component, so only
      # `[a-zA-Z0-9-]` are safe. Replace unsafe chars with `-`, collapse
      # consecutive dashes, strip leading/trailing dashes, and fall back
      # to `pr-<number>` when sanitising produces an empty string.
      - name: Compute preview branch
        id: branch
        if: github.event_name == 'pull_request'
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          safe=$(printf '%s' "$HEAD_REF" | sed 's/[^a-zA-Z0-9-]/-/g; s/--*/-/g; s/^-//; s/-$//')
          if [ -z "$safe" ]; then
            safe="pr-${PR_NUMBER}"
          fi
          echo "name=$safe" >> "$GITHUB_OUTPUT"

      # Deploy to Cloudflare Pages.
      # - push / workflow_dispatch -> `--branch=main` = production
      # - pull_request              -> `--branch=<sanitised-head-ref>` = preview
      # The project `afi` is a Direct Upload project (to be created by
      # agentculture/cloudflare), so CF won't auto-build; this step IS
      # the build+deploy pipeline. Skipped until the CF secrets land.
      - name: Check Cloudflare secrets
        id: secrets
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_API_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets not yet configured; skipping deploy. See agentculture/cloudflare for wiring."
          fi
      - name: Deploy to Cloudflare Pages
        id: deploy
        if: steps.secrets.outputs.present == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/_site --project-name=afi --branch=${{ github.event_name == 'pull_request' && steps.branch.outputs.name || 'main' }}

      # Post the preview URL back on the PR so reviewers can click
      # through without digging into the workflow logs. Uses a marker
      # (`<!-- afi-docs-preview -->`) to update the existing comment on
      # subsequent pushes instead of spamming a new comment per run.
      - name: Post (or update) preview URL comment
        if: github.event_name == 'pull_request' && steps.deploy.outputs.deployment-url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          BRANCH: ${{ steps.branch.outputs.name }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          MARKER='<!-- afi-docs-preview -->'
          ALIAS_URL="https://${BRANCH}.afi.pages.dev"
          BODY="$MARKER"$'\n'"📘 **docs preview** for this PR:"$'\n\n'"- **Latest deploy:** $DEPLOY_URL  _(immutable — this specific commit)_"$'\n'"- **Branch alias:** $ALIAS_URL  _(always latest — updates on each push)_"
          EXISTING=$(gh api --paginate "repos/$REPO/issues/$PR_NUMBER/comments" \
            | jq -rs "add | [.[] | select(.body | contains(\"$MARKER\")) | .id] | first // empty")
          if [ -n "$EXISTING" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$EXISTING" \
              -f body="$BODY" > /dev/null
            echo "Updated existing preview comment #$EXISTING"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
            echo "Created new preview comment"
          fi
