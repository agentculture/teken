name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "teken/**"
      - "packaging/afi-cli/**"
  pull_request:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "teken/**"
      - "packaging/afi-cli/**"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - run: uv run pytest -n auto -v

  test-publish:
    # Skip on fork PRs — no OIDC/environment context is available there, so
    # the publish step would fail and block external contributor CI.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: test
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - name: Set dev version
        run: |
          BASE=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          DEV_VERSION="${BASE}.dev${{ github.run_number }}"
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" pyproject.toml
          # Keep the afi-cli wrapper in lockstep: its own version + the teken pin.
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" packaging/afi-cli/pyproject.toml
          sed -i "s/teken==${BASE}/teken==${DEV_VERSION}/" packaging/afi-cli/pyproject.toml
          echo "DEV_VERSION=${DEV_VERSION}" >> "$GITHUB_ENV"
          echo "Publishing ${DEV_VERSION} to TestPyPI"

      - name: Build and publish to TestPyPI
        run: |
          # Build the canonical teken dist and the metadata-only afi-cli wrapper.
          uv build
          uv build packaging/afi-cli -o dist/
          # Publish each project separately so each gets its own trusted-publishing token.
          uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always --check-url https://test.pypi.org/simple/ dist/teken-*
          uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always --check-url https://test.pypi.org/simple/ dist/afi_cli-*

      - name: Print install commands
        if: always()
        run: |
          echo "::notice::Test with: uv tool install --index-url https://test.pypi.org/simple/ --index-strategy unsafe-best-match teken==${DEV_VERSION}"

  publish:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - run: uv sync

      - name: Build and publish to PyPI
        run: |
          # Build the canonical teken dist and the metadata-only afi-cli wrapper.
          uv build
          uv build packaging/afi-cli -o dist/
          # Publish each project separately so each gets its own trusted-publishing token.
          uv publish --trusted-publishing always --check-url https://pypi.org/simple/ dist/teken-*
          uv publish --trusted-publishing always --check-url https://pypi.org/simple/ dist/afi_cli-*
