# SonarCloud project identity. Project must be registered on sonarcloud.io
# under the agentculture organization, and the SonarCloud GitHub App must
# be installed on this repo, before the scan will produce a quality gate.
sonar.projectKey=agentculture_teken
sonar.organization=agentculture

# Source layout — package lives at the top level (no src/ wrapper).
sonar.sources=teken
sonar.tests=tests

# Coverage report produced in CI by `uv run pytest --cov-report=xml:coverage.xml`
# (see .github/workflows/tests.yml). Path is relative to the repo root.
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.12

# Don't analyze noise. teken/cite/references holds vendored reference impls
# that are *cited* into downstream repos, not maintained as first-party code.
sonar.exclusions=**/__pycache__/**,**/.venv/**,uv.lock,teken/cite/references/**
