# SonarCloud project identity. Project must be registered on sonarcloud.io
# under the agentculture organization, and the SonarCloud GitHub App must
# be installed on this repo, before the scan will produce a quality gate.
sonar.projectKey=agentculture_agentfront
sonar.organization=agentculture

# Source layout — package lives at the top level (no src/ wrapper).
sonar.sources=agentfront
sonar.tests=tests

# Coverage report produced in CI by `uv run pytest --cov-report=xml:coverage.xml`
# (see .github/workflows/tests.yml). Path is relative to the repo root.
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.12

# Don't analyze noise. agentfront/cite/references holds vendored reference impls
# that are *cited* into downstream repos, not maintained as first-party code.
sonar.exclusions=**/__pycache__/**,**/.venv/**,uv.lock,agentfront/cite/references/**

# Block CI on a failing quality gate. The scanner polls SonarCloud and exits
# non-zero on a red gate (coverage regression on new code, new bugs/vulns),
# matching the sibling `convertible` repo. Only takes effect when the
# SonarCloud Scan step actually runs — that step is guarded by
# `SONAR_TOKEN_PRESENT == 'true'` in .github/workflows/tests.yml, so token-less
# repos and fork PRs (no injected secret) skip the scan and stay green.
sonar.qualitygate.wait=true
